openapi: 3.0.0
info:
  title: API de Gestión de Tareas - UABC
  description: API con autenticación de Google OAuth2 y gestión de tareas personales.
  version: 1.0.0

servers:
  - url: http://localhost:3100
    description: Servidor de Desarrollo Local

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Cookie de sesión generada tras el login con Google.

  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Juan Perez
        email:
          type: string
          example: juan.perez@uabc.edu.mx
        activo:
          type: boolean
          example: true

    Tarea:
      type: object
      properties:
        id:
          type: integer
          example: 10
        titulo:
          type: string
          example: Mi primera tarea
        descripcion:
          type: string
          example: Descripción detallada de la tarea
        completada:
          type: boolean
          example: false
        usuarioId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /api/auth/google:
    get:
      summary: Iniciar sesión con Google
      tags:
        - Autenticación
      responses:
        '302':
          description: Redirige a la página de consentimiento de Google.

  /api/auth/google/callback:
    get:
      summary: Callback de Google OAuth
      tags:
        - Autenticación
      responses:
        '200':
          description: Autenticación exitosa, sesión iniciada.
        '401':
          description: Error en la autenticación.

  /api/tareas:
    get:
      summary: Listar todas las tareas del usuario logueado
      tags:
        - Tareas
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Lista de tareas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tarea'
        '401':
          description: No autorizado (sin sesión activa).

    post:
      summary: Crear una nueva tarea
      tags:
        - Tareas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
              properties:
                titulo:
                  type: string
                descripcion:
                  type: string
                completada:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Tarea creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarea'
        '400':
          description: Error de validación o faltan campos obligatorios.
        '401':
          description: Sesión no encontrada.

  /api/tareas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Obtener detalle de una tarea
      tags:
        - Tareas
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Datos de la tarea.
        '404':
          description: Tarea no encontrada.
